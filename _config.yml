title: Inseo Jang
name: Inseo Jang
position: Ph.D. student
email: isjang08@kaist.ac.kr
description: >- 
  Great Day! 
  I am a Ph.D student at [VML KAIST](https://vml.kaist.ac.kr/) in South Korea, advised by Prof. [Junyong Noh](https://vml.kaist.ac.kr/main/people/person/1). 
  My research area is character animation and robotics.
  Especially, I am interested in bridging the two fields: transferring expressive motions of virtual characters to physical robots, and bringing physical plausibility from robotics into character animation!


  **Research Topic: Character animation, Robotics, Motion retargeting**
# During my master's degree, I was in GML advised by Prof. [Hyeong-Seok Ko](http://graphics.snu.ac.kr/~ko/). I studied cloth simulation and conducted research on improving the simulation speed.  
# I am grateful for the opportunity to learn new things and look forward to experiencing new challenges. 
# Research Topic. Character animation, Motion retargeting, Cloth simulation
  


